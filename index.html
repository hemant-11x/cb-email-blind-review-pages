    const fromBase64 = value => Uint8Array.from(atob(value), character => character.charCodeAt(0));
    async function decrypt(passphrase) {
      const encoder = new TextEncoder();
      const material = await crypto.subtle.importKey('raw', encoder.encode(passphrase), 'PBKDF2', false, ['deriveKey']);
      const key = await crypto.subtle.deriveKey({ name: 'PBKDF2', hash: 'SHA-256', salt: fromBase64(ENCRYPTED_REVIEW.salt), iterations: ENCRYPTED_REVIEW.iterations }, material, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
      const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: fromBase64(ENCRYPTED_REVIEW.iv), tagLength: 128 }, key, fromBase64(ENCRYPTED_REVIEW.ciphertext));
      return new TextDecoder().decode(plain);
    }
    document.getElementById('unlockForm').addEventListener('submit', async event => {
      event.preventDefault();
      const input = document.getElementById('passphrase');
      const button = document.getElementById('unlockButton');
      const error = document.getElementById('error');
      button.disabled = true; button.textContent = 'Decrypting…'; error.textContent = '';
      try {
        const html = await decrypt(input.value);
        input.value = '';
        document.open(); document.write(html); document.close();
      } catch {
        error.textContent = 'That passphrase did not unlock the review. Check it and try again.';
        input.select(); button.disabled = false; button.textContent = 'Unlock review';
      }
    });
  </script>
